<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cursed Isle - Comparar</title>
    <link href="img/logo.svg" rel="icon">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/cabecalho.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/compare.css">
    <link rel="stylesheet" href="css/media.css">
</head>
<body>
    <header class="cabecalho">
        <div class="topnav">
            <a class="logo" href="index.html">
                <img class="logo_imagem" src="img/logo.png" alt="Logo The Cursed Dinosaur Isle">
                <span id="titulo">The Cursed Dinosaur Isle</span>
            </a>
        </div>
        <nav class="navbar">
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item"><a href="galeria.html" class="nav-link">Galeria</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown" aria-expanded="false" role="button">Info</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="tasks.html">Tasks</a></li>
                        <li><a class="dropdown-item" href="status.html">Status</a></li>
                        <li><a class="dropdown-item active" href="compare.html" aria-current="page">Comparar</a></li>
                        <li><a class="dropdown-item" href="mecanicas.html">Mecânicas</a></li>
                    </ul>
                </li>
            </ul>
            <div class="hamburger" id="hamburger" tabindex="0" role="button" aria-label="Abrir menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main>
        <h1>Comparar Espécies</h1>
        <h2>Selecione duas criaturas para avaliar seus dados lado a lado</h2>

        <section class="compare-panel" aria-labelledby="compare-controls-title">
            <h3 id="compare-controls-title">Escolha as espécies</h3>
            <div class="compare-controls">
                <label class="select-group" for="species-a">
                    <span>Espécie A</span>
                    <select id="species-a"></select>
                </label>

                <span class="compare-versus" aria-hidden="true">VS</span>

                <label class="select-group" for="species-b">
                    <span>Espécie B</span>
                    <select id="species-b"></select>
                </label>
            </div>
        </section>

        <section class="summary-grid" id="summary-grid" aria-live="polite"></section>

        <section class="comparison-section" aria-labelledby="stats-title">
            <h2 id="stats-title">Atributos</h2>
            <div class="table-container comparison-table-wrap">
                <table class="comparison-table">
                    <thead>
                        <tr>
                            <th>Atributo</th>
                            <th id="table-species-a">Espécie A</th>
                            <th id="table-species-b">Espécie B</th>
                            <th>Diferença</th>
                        </tr>
                    </thead>
                    <tbody id="comparison-body"></tbody>
                </table>
            </div>
        </section>

        <section class="skills-comparison" aria-labelledby="skills-title">
            <h2 id="skills-title">Habilidades</h2>
            <div class="skills-grid" id="skills-grid"></div>
        </section>
    </main>

    <footer class="rodape">
        <span>&copy; 2026, Ablaze</span>
    </footer>

    <script src="js/index.js"></script>
    <script src="data/data.js"></script>
    <script src="js/compare.js"></script>
</body>
</html>
